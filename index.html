<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Insomnia Journal</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="stylesheet" href="./style.css">
    <!-- Fonts: Cormorant Garamond for UI, Caveat for handwritten entries -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="ambient-glow"></div>
    
    <div class="journal-container">
        <header>
            <h1 class="rgb-text">Insomnia Journal</h1>
            <button id="installBtn" class="install-btn" style="display: none;">Install App</button>
        </header>

        <nav>
            <button class="tab-btn active" data-target="nightly">Nightly</button>
            <button class="tab-btn" data-target="dreams">Dreams & Nightmares</button>
            <button class="tab-btn" data-target="thoughts">Thoughts</button>
        </nav>

        <main>
            <!-- NIGHTLY SECTION -->
            <section id="nightly" class="tab-content active">
                <button class="action-btn toggle-form-btn">Write Tonight</button>
                <div class="form-container hidden">
                    <select id="nightly-mood" class="journal-input">
                        <option value="" disabled selected>Current Mood...</option>
                        <option value="Restless">Restless</option>
                        <option value="Anxious">Anxious</option>
                        <option value="Melancholic">Melancholic</option>
                        <option value="Numb">Numb</option>
                        <option value="Calm">Calm</option>
                        <option value="Reflective">Reflective</option>
                    </select>
                    <textarea id="nightly-text" class="journal-input" rows="5" placeholder="What's keeping you awake?"></textarea>
                    <button class="action-btn save-btn" data-type="nightly">Save Entry</button>
                </div>
                <div class="entries-list" id="nightly-entries"></div>
            </section>

            <!-- DREAMS SECTION -->
            <section id="dreams" class="tab-content">
                <button class="action-btn toggle-form-btn">Log a Dream</button>
                <div class="form-container hidden">
                    <textarea id="dreams-text" class="journal-input" rows="5" placeholder="Describe the dream or nightmare..."></textarea>
                    <button class="action-btn save-btn" data-type="dreams">Save Entry</button>
                </div>
                <div class="entries-list" id="dreams-entries"></div>
            </section>

            <!-- THOUGHTS SECTION -->
            <section id="thoughts" class="tab-content">
                <button class="action-btn toggle-form-btn">Record a Thought</button>
                <div class="form-container hidden">
                    <textarea id="thoughts-text" class="journal-input" rows="5" placeholder="Let your mind wander..."></textarea>
                    <button class="action-btn save-btn" data-type="thoughts">Save Entry</button>
                </div>
                <div class="entries-list" id="thoughts-entries"></div>
            </section>
        </main>
    </div>

    <script src="./app.js"></script>
</body>
</html>
