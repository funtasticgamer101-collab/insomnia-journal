<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Insomnia Journal" />
  <meta name="theme-color" content="#0d0a1a" />
  <title>My Insomnia Journal</title>

  <!-- PWA Manifest inline via JS -->
  <script>
    const manifest = {
      name: "My Insomnia Journal",
      short_name: "Insomnia",
      description: "Colin's personal insomnia & dream journal",
      start_url: ".",
      display: "standalone",
      background_color: "#0d0a1a",
      theme_color: "#0d0a1a",
      orientation: "portrait",
      icons: [
        { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%231a103c'/%3E%3Ctext x='96' y='130' font-size='110' text-anchor='middle'%3E%F0%9F%8C%99%3C/text%3E%3C/svg%3E", sizes: "192x192", type: "image/svg+xml" },
        { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='80' fill='%231a103c'/%3E%3Ctext x='256' y='360' font-size='300' text-anchor='middle'%3E%F0%9F%8C%99%3C/text%3E%3C/svg%3E", sizes: "512x512", type: "image/svg+xml" }
      ]
    };
    const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    document.write('<link rel="manifest" href="' + url + '">');
  </script>

  <!-- Apple touch icon -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='36' fill='%231a103c'/%3E%3Ctext x='90' y='125' font-size='100' text-anchor='middle'%3E%F0%9F%8C%99%3C/text%3E%3C/svg%3E" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Schoolbell&family=Caveat:wght@400;600;700&family=Reenie+Beanie&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow-x: hidden; }
    body { background: #0d0a1a; font-family: 'Caveat', cursive; }

    #root { min-height: 100vh; }

    .journal-root {
      min-height: 100vh;
      min-height: -webkit-fill-available;
      background: #0d0a1a;
      font-family: 'Caveat', cursive;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 24px 16px 60px;
      padding-top: calc(24px + env(safe-area-inset-top));
      padding-bottom: calc(60px + env(safe-area-inset-bottom));
      position: relative;
      overflow-x: hidden;
    }

    /* STARS */
    .star {
      position: fixed;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--dur) var(--delay) ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes twinkle {
      from { opacity: 0.15; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1.2); }
    }

    /* BOOK */
    .book {
      width: 100%;
      max-width: 600px;
      position: relative;
      z-index: 1;
      animation: floatUp 0.6s ease both;
    }
    .book.flip { animation: pageFlip 0.35s ease both; }
    @keyframes floatUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pageFlip {
      0% { opacity: 1; transform: rotateY(0deg); }
      50% { opacity: 0; transform: rotateY(20deg) scale(0.97); }
      100% { opacity: 1; transform: rotateY(0deg); }
    }

    /* COVER */
    .cover {
      background: linear-gradient(145deg, #1a103c 0%, #0f1f4a 50%, #1a103c 100%);
      border-radius: 4px 20px 20px 4px;
      border-left: 18px solid #2a1060;
      box-shadow: -4px 0 0 #3b1a80, 8px 8px 32px #00000099, inset 0 0 60px rgba(100,60,200,0.08);
      padding: 44px 32px;
      min-height: 500px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      position: relative;
      overflow: hidden;
    }
    .cover::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(transparent, transparent 31px, rgba(255,255,255,0.04) 32px);
      pointer-events: none;
    }
    .cover-sticker {
      font-size: 56px;
      filter: drop-shadow(0 0 12px rgba(200,150,255,0.6));
      animation: bobble 3s ease-in-out infinite;
    }
    @keyframes bobble {
      0%,100% { transform: translateY(0) rotate(-3deg); }
      50% { transform: translateY(-6px) rotate(3deg); }
    }
    .cover-title {
      font-family: 'Schoolbell', cursive;
      font-size: 40px;
      color: #e8d5ff;
      text-align: center;
      line-height: 1.1;
      text-shadow: 0 0 20px rgba(180,100,255,0.5), 2px 2px 0 rgba(0,0,0,0.4);
      letter-spacing: 1px;
    }
    .cover-subtitle {
      font-family: 'Reenie Beanie', cursive;
      font-size: 20px;
      color: #a07ad0;
      letter-spacing: 2px;
      white-space: nowrap;
      text-align: center;
      width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cover-divider {
      width: 160px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #7c4dcc, transparent);
      border-radius: 2px;
    }
    .cover-label-box {
      background: rgba(255,255,255,0.06);
      border: 1.5px dashed rgba(200,160,255,0.3);
      border-radius: 12px;
      padding: 12px 24px;
      text-align: center;
      width: 100%;
    }
    .field-name {
      font-family: 'Schoolbell', cursive;
      color: #8b6ab5;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      display: block;
    }
    .field-val {
      font-family: 'Caveat', cursive;
      color: #d4b8f0;
      font-size: 22px;
      display: block;
      border-bottom: 1.5px solid rgba(200,160,255,0.3);
      min-width: 180px;
      margin-top: 2px;
    }
    .toc { width: 100%; margin-top: 8px; }
    .toc-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      border: 1.5px solid transparent;
      margin-bottom: 8px;
      -webkit-user-select: none;
      user-select: none;
    }
    .toc-item:active {
      background: rgba(130,70,220,0.2);
      transform: translateX(4px);
    }
    .toc-item-icon { font-size: 22px; }
    .toc-item-label { font-family: 'Schoolbell', cursive; color: #c8a8f0; font-size: 18px; }
    .toc-item-count {
      margin-left: auto;
      background: rgba(120,60,200,0.3);
      color: #b090e8;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 14px;
    }

    /* SECTION PAGE */
    .section-page {
      background: #f5f0e8;
      border-radius: 4px 14px 14px 4px;
      border-left: 18px solid #2a1060;
      box-shadow: -4px 0 0 #3b1a80, 8px 8px 32px #00000099;
      min-height: calc(100vh - 80px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }
    .section-page::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(transparent, transparent 31px, rgba(180,160,220,0.25) 32px);
      pointer-events: none;
      z-index: 0;
    }
    .section-page::after {
      content: '';
      position: absolute;
      left: 56px;
      top: 0; bottom: 0;
      width: 1.5px;
      background: rgba(220,160,160,0.4);
      z-index: 0;
    }
    .section-header {
      position: relative; z-index: 1;
      padding: 20px 20px 14px 68px;
      border-bottom: 2px dashed rgba(160,120,220,0.3);
      display: flex; align-items: center; gap: 10px;
      flex-wrap: wrap;
    }
    .section-back {
      cursor: pointer;
      font-size: 18px;
      background: rgba(100,60,180,0.12);
      border: 1.5px solid rgba(100,60,180,0.25);
      border-radius: 50%;
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .section-back:active { background: rgba(100,60,180,0.3); }
    .section-title { font-family: 'Schoolbell', cursive; font-size: 22px; color: #3a1a6e; }
    .section-title span { font-size: 15px; color: #9070c0; }
    .add-btn {
      margin-left: auto;
      background: #5c2d91;
      color: white;
      border: none;
      border-radius: 20px;
      padding: 7px 16px;
      font-family: 'Schoolbell', cursive;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(80,30,160,0.3);
      -webkit-user-select: none;
      user-select: none;
    }
    .add-btn:active { background: #7a3dbd; }

    .entries-list {
      position: relative; z-index: 1;
      padding: 14px 16px 24px 68px;
      display: flex; flex-direction: column; gap: 10px;
      overflow-y: auto;
      flex: 1;
    }
    .empty-state {
      text-align: center;
      padding: 48px 16px;
      color: #b0a0cc;
      font-size: 18px;
    }
    .empty-state .emoji { font-size: 44px; display: block; margin-bottom: 10px; }

    /* CARDS */
    .night-card {
      background: rgba(255,255,255,0.75);
      border-radius: 10px;
      border: 1.5px solid rgba(160,120,220,0.25);
      padding: 11px 14px;
      cursor: pointer;
      transition: box-shadow 0.2s;
      box-shadow: 2px 2px 8px rgba(100,60,180,0.08);
      -webkit-user-select: none;
      user-select: none;
    }
    .night-card.open { background: rgba(245,235,255,0.92); border-color: rgba(130,80,220,0.4); }
    .night-card-header { display: flex; align-items: center; gap: 8px; }
    .night-date { font-family: 'Schoolbell', cursive; font-size: 17px; color: #3a1a6e; }
    .night-meta { font-size: 13px; color: #7060a0; margin-left: auto; }
    .quality-dots { display: flex; gap: 3px; }
    .quality-dot { width: 9px; height: 9px; border-radius: 50%; }
    .night-card-body { margin-top: 8px; font-size: 16px; color: #503080; line-height: 1.4; }
    .card-del {
      margin-left: 6px; background: none; border: none; cursor: pointer;
      font-size: 13px; opacity: 0.4; color: #c03060; padding: 4px;
    }
    .card-del:active { opacity: 1; }

    .dream-card {
      background: linear-gradient(135deg, rgba(240,230,255,0.85) 0%, rgba(255,245,255,0.85) 100%);
      border-radius: 10px;
      border: 1.5px solid rgba(200,160,255,0.35);
      padding: 11px 14px;
      cursor: pointer;
      box-shadow: 2px 2px 8px rgba(150,80,220,0.1);
      -webkit-user-select: none;
      user-select: none;
    }
    .dream-card.open { border-color: rgba(160,80,255,0.5); }
    .dream-title { font-family: 'Schoolbell', cursive; font-size: 18px; color: #3a1060; }
    .dream-tag {
      display: inline-block;
      background: rgba(140,80,220,0.12);
      color: #7040b0;
      border-radius: 20px;
      padding: 2px 8px;
      font-size: 12px;
      margin: 3px 3px 0 0;
    }
    .dream-body { margin-top: 8px; font-size: 16px; color: #503080; line-height: 1.45; }

    /* FORM OVERLAY */
    .form-overlay {
      position: fixed; inset: 0;
      background: rgba(10,5,25,0.78);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 100;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .form-card {
      background: #f5f0e8;
      border-radius: 20px 20px 0 0;
      padding: 24px 22px;
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
      width: 100%;
      max-width: 600px;
      box-shadow: 0 -8px 40px rgba(0,0,0,0.5);
      border: 2px solid rgba(160,100,255,0.3);
      border-bottom: none;
      animation: slideUp 0.28s ease both;
      max-height: 90vh;
      overflow-y: auto;
    }
    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .form-title { font-family: 'Schoolbell', cursive; font-size: 24px; color: #3a1a6e; margin-bottom: 18px; }
    .form-row { margin-bottom: 14px; }
    .form-label { font-family: 'Schoolbell', cursive; font-size: 13px; color: #7060a0; letter-spacing: 1px; display: block; margin-bottom: 5px; text-transform: uppercase; }
    .form-input, .form-textarea {
      width: 100%;
      background: white;
      border: 1.5px solid rgba(140,100,200,0.3);
      border-radius: 8px;
      padding: 9px 12px;
      font-family: 'Caveat', cursive;
      font-size: 18px;
      color: #3a1a5e;
      outline: none;
      -webkit-appearance: none;
    }
    .form-input:focus, .form-textarea:focus { border-color: #8040d0; }
    .form-textarea { min-height: 90px; resize: vertical; }
    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .quality-picker { display: flex; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
    .quality-btn {
      width: 38px; height: 38px; border-radius: 50%;
      border: 2px solid rgba(140,100,200,0.3);
      background: white; cursor: pointer;
      font-size: 18px; display: flex; align-items: center; justify-content: center;
    }
    .quality-btn.active { border-color: #8040d0; background: rgba(130,60,210,0.12); transform: scale(1.1); }
    .tag-picker { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .tag-btn {
      background: white;
      border: 1.5px solid rgba(140,100,200,0.3);
      border-radius: 20px;
      padding: 5px 12px;
      font-family: 'Caveat', cursive;
      font-size: 15px;
      color: #7060a0;
      cursor: pointer;
    }
    .tag-btn.active { background: rgba(130,60,210,0.12); border-color: #8040d0; color: #5020a0; }
    .form-actions { display: flex; gap: 10px; margin-top: 18px; justify-content: flex-end; }
    .btn-save {
      background: #5c2d91; color: white; border: none; border-radius: 20px;
      padding: 10px 24px; font-family: 'Schoolbell', cursive; font-size: 17px; cursor: pointer;
    }
    .btn-save:active { background: #7a3dbd; }
    .btn-cancel {
      background: rgba(100,60,160,0.1); color: #6040a0;
      border: 1.5px solid rgba(100,60,160,0.2);
      border-radius: 20px; padding: 10px 20px;
      font-family: 'Schoolbell', cursive; font-size: 17px; cursor: pointer;
    }
  </style>
</head>
<body>
<div id="root"></div>

<!-- React + Babel for JSX -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect } = React;

// ── Storage: uses localStorage for standalone PWA ──
const store = {
  get(key) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch { return null; } },
  set(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} },
};

const STAR_COUNT = 28;
const stars = Array.from({ length: STAR_COUNT }, (_, i) => ({
  id: i, top: Math.random() * 100, left: Math.random() * 100,
  size: Math.random() * 3 + 1, delay: Math.random() * 3, dur: Math.random() * 2 + 2,
}));

const MOON_PHASES = ["🌑","🌒","🌓","🌔","🌕","🌖","🌗","🌘"];
const DREAM_TAGS  = ["😴 Vivid","👻 Scary","🌈 Surreal","💭 Lucid","🔁 Recurring","🌊 Strange"];
const MOOD_EMOJIS = ["😩","😟","😐","🙂","😊"];
const FEEL_EMOJIS = ["😔","😰","😤","😢","😶","🥺","😌","💭","🌀","💔"];

const SEED_NIGHT = {
  id: 1742518260000,
  date: "2026-03-21",
  bedtime: "02:31",
  slept: "",
  quality: 0,
  notes: `Felt my insomnia keeping me up even after eating and practicing self-care exercises. Earlier today I accomplished a 5-mile skate on my longboard which tired me out — but a horrible "second wind" hit and kept me up. Found myself tossing and turning, unable to get comfortable. Going to watch some calm television and drink some extra water. Will update whether I slept or not.`
};

function formatDate(d) {
  return new Date(d + "T12:00:00").toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
}

function App() {
  const [page, setPage]             = useState("cover");
  const [nights, setNights]         = useState([]);
  const [dreams, setDreams]         = useState([]);
  const [thoughts, setThoughts]     = useState([]);
  const [addingNight, setAddingNight]   = useState(false);
  const [addingDream, setAddingDream]   = useState(false);
  const [addingThought, setAddingThought] = useState(false);
  const [nightForm, setNightForm]   = useState({ date:"", bedtime:"", slept:"", quality:2, notes:"" });
  const [dreamForm, setDreamForm]   = useState({ date:"", title:"", tags:[], content:"" });
  const [thoughtForm, setThoughtForm] = useState({ date:"", title:"", emotion:"😔", content:"" });
  const [expandedNight, setExpandedNight]   = useState(null);
  const [expandedDream, setExpandedDream]   = useState(null);
  const [expandedThought, setExpandedThought] = useState(null);
  const [flip, setFlip] = useState(false);

  useEffect(() => {
    const n = store.get("ij_nights");
    setNights(n && n.length ? n : [SEED_NIGHT]);
    if (!n || !n.length) store.set("ij_nights", [SEED_NIGHT]);
    const d = store.get("ij_dreams");   if (d) setDreams(d);
    const t = store.get("ij_thoughts"); if (t) setThoughts(t);
  }, []);

  function saveNights(arr)   { setNights(arr);   store.set("ij_nights", arr); }
  function saveDreams(arr)   { setDreams(arr);   store.set("ij_dreams", arr); }
  function saveThoughts(arr) { setThoughts(arr); store.set("ij_thoughts", arr); }

  function addNight() {
    if (!nightForm.date) return;
    saveNights([{ ...nightForm, id: Date.now() }, ...nights]);
    setNightForm({ date:"", bedtime:"", slept:"", quality:2, notes:"" });
    setAddingNight(false);
  }
  function addDream() {
    if (!dreamForm.date || !dreamForm.title) return;
    saveDreams([{ ...dreamForm, id: Date.now() }, ...dreams]);
    setDreamForm({ date:"", title:"", tags:[], content:"" });
    setAddingDream(false);
  }
  function addThought() {
    if (!thoughtForm.date || !thoughtForm.title) return;
    saveThoughts([{ ...thoughtForm, id: Date.now() }, ...thoughts]);
    setThoughtForm({ date:"", title:"", emotion:"😔", content:"" });
    setAddingThought(false);
  }

  function deleteNight(id)   { saveNights(nights.filter(n => n.id !== id)); }
  function deleteDream(id)   { saveDreams(dreams.filter(d => d.id !== id)); }
  function deleteThought(id) { saveThoughts(thoughts.filter(t => t.id !== id)); }

  function toggleTag(tag) {
    setDreamForm(f => ({ ...f, tags: f.tags.includes(tag) ? f.tags.filter(t => t !== tag) : [...f.tags, tag] }));
  }

  function navigate(to) {
    setFlip(true);
    setTimeout(() => { setPage(to); setFlip(false); }, 350);
  }

  const today = new Date().toISOString().split("T")[0];
  const qualityColors = ["#e05070","#e07050","#d0b030","#60b060","#3090d0"];

  return (
    <div className="journal-root">
      {stars.map(s => (
        <div key={s.id} className="star" style={{
          top:`${s.top}%`, left:`${s.left}%`,
          width:`${s.size}px`, height:`${s.size}px`,
          "--delay":`${s.delay}s`, "--dur":`${s.dur}s`
        }} />
      ))}

      <div className={`book${flip ? " flip" : ""}`}>

        {/* ── COVER ── */}
        {page === "cover" && (
          <div className="cover">
            <div className="cover-sticker">🌙</div>
            <div className="cover-title">My Insomnia<br/>Journal</div>
            <div className="cover-subtitle">★ A Record of Sleepless Nights ★</div>
            <div className="cover-divider" />
            <div className="cover-label-box">
              <span className="field-name">Belongs to</span>
              <span className="field-val">Colin</span>
            </div>
            <div className="toc">
              {[
                { to:"s1", icon:"🌛", label:"Section I — Night by Night", count: nights.length },
                { to:"s2", icon:"💭", label:"Section II — Dreams & Nightmares", count: dreams.length },
                { to:"s3", icon:"🫀", label:"Section III — Thoughts & Feelings", count: thoughts.length },
              ].map(item => (
                <div key={item.to} className="toc-item" onClick={() => navigate(item.to)}>
                  <span className="toc-item-icon">{item.icon}</span>
                  <span className="toc-item-label">{item.label}</span>
                  <span className="toc-item-count">{item.count}</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ── SECTION I ── */}
        {page === "s1" && (
          <div className="section-page">
            <div className="section-header">
              <div className="section-back" onClick={() => navigate("cover")}>←</div>
              <div className="section-title">🌛 Section I <span>— Night by Night</span></div>
              <button className="add-btn" onClick={() => setAddingNight(true)}>＋ Add Night</button>
            </div>
            <div className="entries-list">
              {nights.length === 0 && (
                <div className="empty-state">
                  <span className="emoji">🛏️</span>
                  No nights recorded yet.<br/>Tap <b>+ Add Night</b> to begin tracking.
                </div>
              )}
              {nights.map(n => {
                const open = expandedNight === n.id;
                return (
                  <div key={n.id} className={`night-card${open?" open":""}`} onClick={() => setExpandedNight(open ? null : n.id)}>
                    <div className="night-card-header">
                      <span style={{fontSize:20}}>{MOON_PHASES[n.id % 8]}</span>
                      <span className="night-date">{formatDate(n.date)}</span>
                      {n.bedtime && <span className="night-meta">🕐 {n.bedtime}</span>}
                      <div className="quality-dots" style={{marginLeft: n.bedtime ? 8 : "auto"}}>
                        {MOOD_EMOJIS.map((e, i) => (
                          <div key={i} className="quality-dot" style={{
                            background: i === n.quality ? qualityColors[i] : "rgba(0,0,0,0.1)",
                            opacity: i === n.quality ? 1 : 0.3
                          }} />
                        ))}
                      </div>
                      <button className="card-del" onClick={e => { e.stopPropagation(); deleteNight(n.id); }}>✕</button>
                    </div>
                    {open && (
                      <div className="night-card-body">
                        {n.slept && <div>😴 Slept approx <b>{n.slept}</b> hrs</div>}
                        {n.notes && <div style={{marginTop:6}}>{n.notes}</div>}
                        <div style={{marginTop:6, fontSize:14, color:"#9080c0"}}>Mood: {MOOD_EMOJIS[n.quality]}</div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ── SECTION II ── */}
        {page === "s2" && (
          <div className="section-page">
            <div className="section-header">
              <div className="section-back" onClick={() => navigate("cover")}>←</div>
              <div className="section-title">💭 Section II <span>— Dreams & Nightmares</span></div>
              <button className="add-btn" onClick={() => setAddingDream(true)}>＋ Add Dream</button>
            </div>
            <div className="entries-list">
              {dreams.length === 0 && (
                <div className="empty-state">
                  <span className="emoji">✨</span>
                  No dreams recorded yet.<br/>Tap <b>+ Add Dream</b> to start.
                </div>
              )}
              {dreams.map(d => {
                const open = expandedDream === d.id;
                return (
                  <div key={d.id} className={`dream-card${open?" open":""}`} onClick={() => setExpandedDream(open ? null : d.id)}>
                    <div style={{display:"flex", alignItems:"center", gap:8}}>
                      <span style={{fontSize:20}}>{d.tags.includes("👻 Scary") ? "😱" : "💫"}</span>
                      <span className="dream-title">{d.title}</span>
                      <span style={{fontSize:12, color:"#9080c0", marginLeft:"auto"}}>{formatDate(d.date)}</span>
                      <button className="card-del" onClick={e => { e.stopPropagation(); deleteDream(d.id); }}>✕</button>
                    </div>
                    <div style={{marginTop:5}}>{d.tags.map(t => <span key={t} className="dream-tag">{t}</span>)}</div>
                    {open && d.content && <div className="dream-body">{d.content}</div>}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ── SECTION III ── */}
        {page === "s3" && (
          <div className="section-page">
            <div className="section-header">
              <div className="section-back" onClick={() => navigate("cover")}>←</div>
              <div className="section-title">🫀 Section III <span>— Thoughts & Feelings</span></div>
              <button className="add-btn" style={{background:"#91305c"}} onClick={() => setAddingThought(true)}>＋ Add Entry</button>
            </div>
            <div className="entries-list">
              {thoughts.length === 0 && (
                <div className="empty-state">
                  <span className="emoji">🫀</span>
                  Nothing written yet.<br/>Tap <b>+ Add Entry</b> to put feelings into words.
                </div>
              )}
              {thoughts.map(t => {
                const open = expandedThought === t.id;
                return (
                  <div key={t.id} className={`dream-card${open?" open":""}`}
                    style={{
                      background: open ? "rgba(255,240,248,0.9)" : "linear-gradient(135deg,rgba(255,240,248,0.82),rgba(255,250,255,0.82))",
                      borderColor: open ? "rgba(220,140,180,0.5)" : "rgba(220,160,200,0.3)"
                    }}
                    onClick={() => setExpandedThought(open ? null : t.id)}>
                    <div style={{display:"flex", alignItems:"center", gap:8}}>
                      <span style={{fontSize:20}}>{t.emotion}</span>
                      <span className="dream-title" style={{color:"#4a1a3a"}}>{t.title}</span>
                      <span style={{fontSize:12, color:"#a070a0", marginLeft:"auto"}}>{formatDate(t.date)}</span>
                      <button className="card-del" onClick={e => { e.stopPropagation(); deleteThought(t.id); }}>✕</button>
                    </div>
                    {open && t.content && <div className="dream-body" style={{color:"#5a2050", marginTop:8}}>{t.content}</div>}
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>

      {/* ── ADD NIGHT FORM ── */}
      {addingNight && (
        <div className="form-overlay" onClick={e => e.target === e.currentTarget && setAddingNight(false)}>
          <div className="form-card">
            <div className="form-title">🌛 Log a Night</div>
            <div className="form-row-2">
              <div className="form-row">
                <label className="form-label">Date</label>
                <input type="date" className="form-input" max={today}
                  value={nightForm.date} onChange={e => setNightForm(f => ({...f, date:e.target.value}))} />
              </div>
              <div className="form-row">
                <label className="form-label">Bedtime</label>
                <input type="time" className="form-input"
                  value={nightForm.bedtime} onChange={e => setNightForm(f => ({...f, bedtime:e.target.value}))} />
              </div>
            </div>
            <div className="form-row">
              <label className="form-label">Hours slept (approx)</label>
              <input type="number" min="0" max="24" step="0.5" className="form-input" placeholder="e.g. 2.5"
                value={nightForm.slept} onChange={e => setNightForm(f => ({...f, slept:e.target.value}))} />
            </div>
            <div className="form-row">
              <label className="form-label">How did you feel?</label>
              <div className="quality-picker">
                {MOOD_EMOJIS.map((em, i) => (
                  <button key={i} className={`quality-btn${nightForm.quality===i?" active":""}`}
                    onClick={() => setNightForm(f => ({...f, quality:i}))}>{em}</button>
                ))}
              </div>
            </div>
            <div className="form-row">
              <label className="form-label">Notes</label>
              <textarea className="form-textarea" placeholder="What kept you awake? Racing thoughts, body tension…"
                value={nightForm.notes} onChange={e => setNightForm(f => ({...f, notes:e.target.value}))} />
            </div>
            <div className="form-actions">
              <button className="btn-cancel" onClick={() => setAddingNight(false)}>Cancel</button>
              <button className="btn-save" onClick={addNight}>Save Night</button>
            </div>
          </div>
        </div>
      )}

      {/* ── ADD DREAM FORM ── */}
      {addingDream && (
        <div className="form-overlay" onClick={e => e.target === e.currentTarget && setAddingDream(false)}>
          <div className="form-card">
            <div className="form-title">💭 Record a Dream</div>
            <div className="form-row-2">
              <div className="form-row">
                <label className="form-label">Date</label>
                <input type="date" className="form-input" max={today}
                  value={dreamForm.date} onChange={e => setDreamForm(f => ({...f, date:e.target.value}))} />
              </div>
              <div className="form-row">
                <label className="form-label">Dream Title</label>
                <input type="text" className="form-input" placeholder="The Flying Dream…"
                  value={dreamForm.title} onChange={e => setDreamForm(f => ({...f, title:e.target.value}))} />
              </div>
            </div>
            <div className="form-row">
              <label className="form-label">Tags</label>
              <div className="tag-picker">
                {DREAM_TAGS.map(tag => (
                  <button key={tag} className={`tag-btn${dreamForm.tags.includes(tag)?" active":""}`}
                    onClick={() => toggleTag(tag)}>{tag}</button>
                ))}
              </div>
            </div>
            <div className="form-row">
              <label className="form-label">Describe the dream</label>
              <textarea className="form-textarea" placeholder="I was in a place that felt like home but wasn't…"
                value={dreamForm.content} onChange={e => setDreamForm(f => ({...f, content:e.target.value}))} />
            </div>
            <div className="form-actions">
              <button className="btn-cancel" onClick={() => setAddingDream(false)}>Cancel</button>
              <button className="btn-save" onClick={addDream}>Save Dream</button>
            </div>
          </div>
        </div>
      )}

      {/* ── ADD THOUGHT FORM ── */}
      {addingThought && (
        <div className="form-overlay" onClick={e => e.target === e.currentTarget && setAddingThought(false)}>
          <div className="form-card">
            <div className="form-title">🫀 A Thought or Feeling</div>
            <div className="form-row-2">
              <div className="form-row">
                <label className="form-label">Date</label>
                <input type="date" className="form-input" max={today}
                  value={thoughtForm.date} onChange={e => setThoughtForm(f => ({...f, date:e.target.value}))} />
              </div>
              <div className="form-row">
                <label className="form-label">Title</label>
                <input type="text" className="form-input" placeholder="What's on your mind?"
                  value={thoughtForm.title} onChange={e => setThoughtForm(f => ({...f, title:e.target.value}))} />
              </div>
            </div>
            <div className="form-row">
              <label className="form-label">How are you feeling?</label>
              <div className="quality-picker">
                {FEEL_EMOJIS.map(em => (
                  <button key={em} className={`quality-btn${thoughtForm.emotion===em?" active":""}`}
                    style={{fontSize:20, width:40, height:40}}
                    onClick={() => setThoughtForm(f => ({...f, emotion:em}))}>{em}</button>
                ))}
              </div>
            </div>
            <div className="form-row">
              <label className="form-label">Write it out</label>
              <textarea className="form-textarea" style={{minHeight:110}}
                placeholder="What's keeping your mind busy tonight? Let it all out here…"
                value={thoughtForm.content} onChange={e => setThoughtForm(f => ({...f, content:e.target.value}))} />
            </div>
            <div className="form-actions">
              <button className="btn-cancel" onClick={() => setAddingThought(false)}>Cancel</button>
              <button className="btn-save" style={{background:"#91305c"}} onClick={addThought}>Save Entry</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<!-- Service Worker for offline support -->
<script>
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'insomnia-journal-v1';
    const ASSETS = [
      'https://fonts.googleapis.com/css2?family=Schoolbell&family=Caveat:wght@400;600;700&family=Reenie+Beanie&display=swap',
      'https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js',
    ];
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS).catch(() => {})));
      self.skipWaiting();
    });
    self.addEventListener('activate', e => { e.waitUntil(self.clients.claim()); });
    self.addEventListener('fetch', e => {
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).then(res => {
        const clone = res.clone();
        caches.open(CACHE).then(c => c.put(e.request, clone));
        return res;
      }).catch(() => r)));
    });
  `;
  const blob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}
</script>
